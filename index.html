<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProVision Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); width: 85%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: #00ff88; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 8px; outline: none; font-size: 14px; }
        input:focus, select:focus { border-color: #00ff88; }
        button { width: 100%; padding: 14px; background: #00ff88; color: #0f172a; font-weight: bold; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #00cc6a; }
        button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
        .hidden { display: none; }
        .signal-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #0f172a; border: 1px dashed #334155; }
        .signal-text { font-size: 22px; font-weight: bold; margin: 10px 0; }
        .green { color: #00ff88; } .red { color: #ff4444; } .yellow { color: #facc15; }
        .loader { color: #38bdf8; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container" id="loading-section">
        <div class="loader">Verifying Access... 🔄</div>
    </div>

    <div class="container hidden" id="login-section">
        <h2>⚙️ ProVision AI</h2>
        <p>Enter credentials to request VIP Access</p>
        <input type="email" id="email" placeholder="Enter Email Address" required>
        <input type="password" id="password" placeholder="Enter VIP Code / Password" required>
        <button onclick="requestAccess()">Submit Request</button>
    </div>

    <div class="container hidden" id="pending-section">
        <h2>⏳ Pending Approval</h2>
        <p>Admin is reviewing your credentials. You will receive a message in Telegram once approved.</p>
    </div>

    <div class="container hidden" id="dashboard-section">
        <h2>📡 Radar Dashboard</h2>
        <p id="user-limits">Credits: Loading...</p>
        
        <select id="pair">
            <option value="EURUSD">🇪🇺 EUR/USD</option>
            <option value="GBPUSD">🇬🇧 GBP/USD</option>
            <option value="USDJPY">🇯🇵 USD/JPY</option>
            <option value="AUDUSD">🇦🇺 AUD/USD</option>
        </select>
        <select id="timeframe">
            <option value="1m">⏱️ 1 Minute Expiry</option>
            <option value="5m">⏱️ 5 Minute Expiry</option>
            <option value="15m">⏱️ 15 Minute Expiry</option>
        </select>
        
        <button id="scan-btn" onclick="getSignal()">Scan Live Market</button>

        <div id="signal-result" class="signal-box hidden">
            <div id="loader" class="loader">Analyzing Market Volume... ⏳</div>
            <div id="final-signal" class="hidden">
                <div class="signal-text" id="signal-direction"></div>
                <p id="signal-info"></p>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // --- IMPORTANT: REPLACE WITH YOUR RENDER APP URL ---
        const BACKEND_URL = "https://aliza-trading-bot.onrender.com"; 
        const userId = tg.initDataUnsafe?.user?.id;

        function showSection(sectionId) {
            document.getElementById("loading-section").classList.add("hidden");
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("pending-section").classList.add("hidden");
            document.getElementById("dashboard-section").classList.add("hidden");
            document.getElementById(sectionId).classList.remove("hidden");
        }

        // 1. Check User Status on App Load
        async function checkUserStatus() {
            if (!userId) {
                document.getElementById("loading-section").innerHTML = "Error: Please open inside Telegram.";
                return;
            }
            try {
                let response = await fetch(`${BACKEND_URL}/api/status`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId })
                });
                let data = await response.json();
                
                if (data.status === "unregistered") {
                    showSection("login-section");
                } else if (data.status === "pending") {
                    showSection("pending-section");
                } else if (data.status === "approved") {
                    document.getElementById("user-limits").innerText = `Signals Left: ${data.limit}`;
                    showSection("dashboard-section");
                } else {
                    document.getElementById("loading-section").innerHTML = "🚫 Account Banned or Locked.";
                }
            } catch (e) {
                document.getElementById("loading-section").innerHTML = "Connection Error to Server.";
            }
        }

        // 2. Submit Login Details
        function requestAccess() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            if (!email || !password) return tg.showAlert("Please fill details.");

            let data = { type: "login", email: email, password: password };
            tg.sendData(JSON.stringify(data)); // Sends data to python bot
            showSection("pending-section"); // Immediately lock the screen
        }

        // 3. Get Signal from Dashboard
        async function getSignal() {
            let pair = document.getElementById("pair").value;
            let tf = document.getElementById("timeframe").value;
            let btn = document.getElementById("scan-btn");
            let resultBox = document.getElementById("signal-result");
            
            btn.disabled = true;
            resultBox.classList.remove("hidden");
            document.getElementById("loader").classList.remove("hidden");
            document.getElementById("final-signal").classList.add("hidden");

            try {
                let response = await fetch(`${BACKEND_URL}/api/signal`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId, pair: pair, timeframe: tf })
                });
                let data = await response.json();
                
                document.getElementById("loader").classList.add("hidden");
                document.getElementById("final-signal").classList.remove("hidden");
                
                let sigDir = document.getElementById("signal-direction");
                let sigInfo = document.getElementById("signal-info");

                if (data.error) {
                    sigDir.innerHTML = `🛑 ERROR`;
                    sigDir.className = "signal-text red";
                    sigInfo.innerHTML = data.error;
                } else {
                    sigDir.innerHTML = data.signal;
                    sigDir.className = `signal-text ${data.color}`;
                    sigInfo.innerHTML = data.text;
                }
            } catch (err) {
                document.getElementById("loader").innerHTML = "❌ Failed to fetch signal.";
            }
            btn.disabled = false;
        }

        // Start checking status as soon as app opens
        window.onload = checkUserStatus;
    </script>
</body>
</html>
